<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>07 정렬 (flexbox, grid)</title>
        <!--구글 폰트 연결-->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&display=swap" rel="stylesheet">
    <style>
        /*기본값으로 초기화*/
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #627070;
            /*구글 폰트 적용*/
            font-family: "Nanum Pen Script", cursive;
            font-size: 16px;

            padding-top: 80px;
        }

        ul, ol {
            list-style-type: none;
        }
        /*----------------------------------------------------------------------------------------------*/
        /*
            flexbox: 1차원 정렬 방식 (가로 or 세로)
            한 방향으로 나열된 아이템(요소)들의 간격과 정렬을 맞출 때, 주로 사용한다
        */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background-color: #576161;
            color: aliceblue;
            padding: 0 24px;

            display: flex;
            flex-direction: row;            /*축 방향 : row = 기본값*/
            /*justify-content: center;      /*모든 요소를 가운데로 정렬*/
            /*justify-content: flex-start;  /*축 방향 기준 시작 위치 flex-start (左⇒右) / start-end (右⇒左)*/
            justify-content: space-between; /*주축 기준으로 양끝 정렬 ⇒ 로고는 왼쪽, 메뉴는 오른쪽으로 분리 */
            align-items: center;            /*교차축 기준으로 중앙 정렬*/
        }
        .menu {
            display: flex;
            gap: 20px;  /*자식 요소들의 간격을 조정하는 설정*/
        }
        .menu > li {
            cursor: pointer;    /*마우스 모양을 손모양으로 변경*/
        }
        .menu > li:hover {
            color: #9cb4b4;
        }
        /*----------------------------------------------------------------------------------------------*/
        /*
            grid: 2차원 정렬 방식 (행과 열을 동시에 제어)
                - minmax(250px, 1fr): 카드의 최소 너비는 250px로 유지하되
                  공간이 남으면 비율 (1fr)에 맞춰서 유연하게 늘어나도록 설정
                - auto-fit: 디바이스의 가로축(부모 요소) 크기에 맞춰서 가능한 많은 행/열을 자동으로 생성
        */
        main {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));

            gap: 20px;
            padding: 30px;
        }
        .card {
            background-color: #576161;
            padding: 24px;
            border: 1px solid #cfdcdf;
            border-radius: 12px;
            box-sizing: 0 2px 4px rgba(0,0,0,0.5);
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .card:hover {
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            transform: translateY(-5px);
        }
        .card h3 {
            color: #304364;
            margin-bottom: 12px;
        }
        .card p {
            color: #d5d6be;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <h1>정렬 실습</h1>

    <!--flexbox-->
    <nav>
        <div class="logo">FlexBox Navigation</div>
        <ul class="menu">
            <li>Home</li>
            <li>Introduce</li>
            <li>Service</li>
            <li>QnA</li>
        </ul>
    </nav>

    <!-- grid -->
     <main>
        <div class="card">
            <h3>FlexBox 특징</h3>
            <p>
                한 방향으로 아이템을 정렬할 때 사용한다
                네비게이션 바 or 요소 내부 정렬에 적합하다
            </p>
        </div>

        <div class="card">
            <h3>Grid 특징</h3>
            <p>
                가로와 세로 행렬을 동시에 관리하는 2차원 레이아웃 <br>
                전체 페이지 구조 or 카드 갤러리 배치에 적합하다
            </p>
        </div>

        <div class="card">
            <h3>점심 메뉴 추천</h3>
            <p>
                ・햄버거 <br> ・타코 <br> ・케밥 <br>
            </p>
        </div>
     </main>
</body>
</html>
